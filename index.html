      <h1>WBConnect+ — WhatsApp Business Integration for Salesforce</h1>
      <p>WBConnect+ puts WhatsApp Business inside Salesforce. Send messages, run campaigns, build flows and track every chat on the CRM record. Built on Meta Cloud API by MV Clouds.</p>

      <section id="features">
        <h2>Features</h2>
        <ul>
          <li><strong>Global Chat Window</strong> — Access live WhatsApp chats from any Salesforce screen: Lightning, Console or Mobile.</li>
          <li><strong>No-Code Flow Builder</strong> — Build WhatsApp forms with drag-and-drop. Collect data, book appointments and run surveys inside WhatsApp.</li>
          <li><strong>Template Builder</strong> — Design and submit Meta-approved WhatsApp message templates with Salesforce merge fields.</li>
          <li><strong>Broadcast &amp; Analytics</strong> — Send high-volume campaigns and track delivery, read and ROI in real time.</li>
          <li><strong>Automation Builder</strong> — Trigger follow-up templates when customers tap quick-reply buttons — no Apex code needed.</li>
          <li><strong>AWS S3 Media Storage</strong> — Store WhatsApp media in your own S3 bucket. You own the data and cut Salesforce storage costs.</li>
        </ul>
      </section>

      <section id="why-choose-us">
        <h2>Why Choose WBConnect+?</h2>
        <p>WBConnect+ is 100% Salesforce-native. All data stays inside your org. You pay zero middleman markup on Meta Cloud API messaging. Unlimited users for a flat monthly fee.</p>
      </section>

      <section id="industries">
        <h2>Industries</h2>
        <p>WBConnect+ supports Real Estate, Healthcare, E-commerce, Education, Travel, Banking, Automotive, Food Delivery, Fitness and Professional Services.</p>
      </section>

      <section id="pricing">
        <h2>Pricing</h2>
        <p>WBConnect+ Standard: <strong>$29 per month</strong> for unlimited Salesforce users. Includes broadcast messaging, flow builder, template builder, automation and full conversation timelines. Enterprise pricing is available for multi-org setups.</p>
      </section>

      <section id="implementation">
        <h2>Getting Started</h2>
        <ol>
          <li>Install the managed package into your Salesforce org.</li>
          <li>Map your Salesforce objects and fields with point-and-click config.</li>
          <li>Connect Meta Cloud API and your AWS S3 bucket.</li>
          <li>Go live with broadcasts, flows and a unified WhatsApp inbox.</li>
        </ol>
      </section>
