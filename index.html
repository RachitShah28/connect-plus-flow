      <h1>Close Deals Faster with a Powerful WhatsApp Automation Tool</h1>
      <p>WBConnect+ is a WhatsApp automation tool that helps businesses streamline communication, automate follow-ups, and manage campaigns from one centralized platform. Designed for sales, support, and marketing teams, it improves response speed, boosts engagement, and helps convert more leads.</p>

      <!-- Problem section -->
      <section id="problem">
        <h2>Your Customers Are on WhatsApp. Your CRM isn't.</h2>
        <p>When your team handles WhatsApp conversations manually, important follow-ups often get delayed, customer queries go unanswered, and sales opportunities slip away. As conversations increase, managing chats without a WhatsApp automation tool creates bottlenecks in sales, support, and marketing, making it harder to scale efficiently.</p>
        <ul>
          <li><strong>Lost Customer Conversations</strong> — When teams use personal WhatsApp numbers, valuable customer relationships and chat history are permanently lost if an employee leaves.</li>
          <li><strong>Missing CRM Data</strong> — Important deal updates get stuck in personal phone chats. Without a proper integration, your management team can't see the full customer picture in Salesforce.</li>
          <li><strong>Time-Consuming Manual Work</strong> — Your sales and support reps waste hours every week copying and pasting WhatsApp messages into Salesforce records instead of focusing on their actual work.</li>
          <li><strong>High Salesforce Storage Fees</strong> — Saving customer images, PDFs, and videos directly into your CRM quickly leads to expensive data storage limits and costly upgrade fees.</li>
        </ul>
      </section>

      <!-- Evolution -->
      <section id="evolution">
        <h2>WBConnect+ versus Standard WhatsApp and Third-Party Middlemen</h2>
        <p>Not all WhatsApp platforms are built for business growth. Unlike standard apps or reseller-based integrations, WBConnect Plus gives your team complete control, deeper automation, and enterprise-grade scalability.</p>
        
        <h3>Standard WhatsApp App — The lonely silo</h3>
        <ul>
          <li>Agents use personal numbers for customer chats</li>
          <li>When an agent leaves, the chat history walks out the door</li>
          <li>No brand identity — customers see a personal contact</li>
          <li>Manual data entry with zero CRM sync</li>
          <li>256 recipient broadcast cap and phone storage fills fast</li>
        </ul>

        <h3>Middleman Competitors — The tangled tax</h3>
        <ul>
          <li>Per-message markup billing eats into margins</li>
          <li>Data stored on third-party servers outside your control</li>
          <li>Expensive Salesforce file usage costs</li>
          <li>Clunky external integrations that break</li>
          <li>Limited custom object support</li>
        </ul>

        <h3>WBConnect+ — The native engine</h3>
        <ul>
          <li>One centralised WhatsApp Business number for the whole organisation</li>
          <li>Customers message the brand, not an individual, building trust and recognition</li>
          <li>Full chat history stays inside Salesforce, owned by the company</li>
          <li>Direct Meta Cloud API billing with automated AWS S3 media offload</li>
          <li>Native no-code flow and template builders plus unlimited broadcasts</li>
        </ul>
      </section>

      <!-- Features section -->
      <section id="features">
        <h2>Everything your team needs to run WhatsApp Business inside Salesforce.</h2>
        <p>From one-to-one conversations to enterprise campaigns, WBConnect Plus gives your team everything needed to automate customer communication and scale faster.</p>
        
        <h3>Global Chat Window — One WhatsApp Conversation Across Every Salesforce Record</h3>
        <p>A persistent WhatsApp chat overlay that follows the rep across Accounts, Cases, Custom Invoices and any Salesforce object you choose. No double-handling and no lost context.</p>
        <ul>
          <li>Renders inside Lightning, Console and Mobile</li>
          <li>Object-agnostic context binding for any Salesforce record</li>
          <li>Quick replies, internal notes and mentions</li>
          <li>Full WhatsApp conversation timeline on every record</li>
        </ul>

        <h3>WhatsApp Flow Builder — Drag, Drop and Collect Inside WhatsApp</h3>
        <p>WhatsApp Flows let you collect customer details right inside a WhatsApp message using forms, menus, date pickers and dropdowns. Meta's Cloud API expects raw JSON; WBConnect+ replaces that with a visual drag-and-drop canvas plus a live preview that mirrors exactly how the Flow renders in your customer's WhatsApp app.</p>
        <ul>
          <li>Drag components onto the canvas with no JSON authoring</li>
          <li>Live WhatsApp app preview as you build</li>
          <li>Auto-publishes a Meta-compliant Flow JSON in the background</li>
          <li>Reusable screens for forms, menus and conditional fields</li>
        </ul>

        <h3>WhatsApp Template Builder — Personalised WhatsApp Templates with Salesforce Merge Fields</h3>
        <p>Design every WhatsApp message template Meta supports including Marketing, Utility and Authentication with rich headers, body copy, footers and quick-reply or call-to-action buttons. Drop in Salesforce merge fields so each customer receives a fully personalised WhatsApp message.</p>
        <ul>
          <li>All Meta-supported template categories and header types</li>
          <li>Merge fields from any Standard or Custom Salesforce object</li>
          <li>Quick-reply, URL and phone-number button support</li>
          <li>Submit for Meta approval in one click and track status inside Salesforce</li>
        </ul>
      </section>

      <!-- Industries section -->
      <section id="industries">
        <h2>Industries Served by WBConnect+</h2>
        <p>WBConnect+ is purpose-built for businesses that rely on WhatsApp to reach customers quickly and at scale. The platform has been deployed across many industries:</p>
        <ul>
          <li><strong>Real Estate</strong> — Send rich property cards, schedule site visits and auto-log responses against the Lead record.</li>
          <li><strong>Healthcare</strong> — Appointment reminders, prescription refills and pre-visit forms — synced to the Patient object.</li>
          <li><strong>E-commerce and Retail</strong> — Trigger cart recovery, order updates and post-purchase NPS — all from your Salesforce Orders.</li>
          <li><strong>Education</strong> — Admission updates, fee reminders and broadcast announcements native to your Education Cloud.</li>
          <li><strong>Travel and Hospitality</strong> — Booking confirmations, check-in reminders, upgrades and on-trip support — all on WhatsApp.</li>
          <li><strong>Banking and Financial Services</strong> — KYC collection, statement delivery, loan offers and dispute handling — secured inside your CRM.</li>
          <li><strong>Automotive</strong> — Test drive booking, finance offers, delivery updates and service reminders — all on one number.</li>
          <li><strong>Food and Delivery</strong> — Take orders, send delivery OTPs and capture feedback — all inside WhatsApp.</li>
          <li><strong>Fitness and Wellness</strong> — Class schedules, trainer chat, renewal reminders and progress check-ins on WhatsApp.</li>
          <li><strong>Professional Services</strong> — Consultations, document requests, status updates and invoices — every message tied to the matter.</li>
        </ul>
      </section>

        <p>Businesses choose WBConnect+ because they need more than messaging — they need automation, reliability, security, and scale.</p>

          <li><strong>Security</strong> — Enterprise-grade security with a Salesforce Native Managed Package. Your data never leaves your org.</li>

      <section id="testimonials">
        <h2>Testimonials</h2>
        <p>Businesses across industries rely on WBConnect+ to automate communication, improve customer experience, and create measurable growth through faster, smarter WhatsApp engagement.</p>

      <!-- ── /faqs page content ──────────────────────────────────────────── -->
      <section id="faqs">
        <h2>Frequently Asked Questions — WBConnect+</h2>
        <p>Visit the FAQs page for a full list of questions and answers. Below is a comprehensive list of FAQs by category:</p>

        <h3>General Questions</h3>
        <dl>
          <dt>What is WBConnect+?</dt>
          <dd>WBConnect+ is a powerful WhatsApp Business API integration designed specifically for Salesforce CRM. It allows businesses to send, receive, and automate WhatsApp messages directly from their Salesforce environment, enabling seamless customer communication at scale.</dd>
          
          <dt>Do I need a WhatsApp Business API account to use WBConnect+?</dt>
          <dd>Yes, WBConnect+ connects your Salesforce CRM to the official WhatsApp Business API. We provide an embedded sign-up process to help you create and link your WhatsApp Business account quickly.</dd>
          
          <dt>Can I use my existing WhatsApp number with WBConnect+?</dt>
          <dd>Yes, you can migrate an existing number to the WhatsApp Business API. However, the number must first be disconnected from the standard WhatsApp or WhatsApp Business mobile app before it can be linked to the API via WBConnect+.</dd>
          
          <dt>How do I create automated marketing workflows?</dt>
          <dd>Marketing workflows automate messages, lead scoring, reminders, and customer journeys, helping businesses improve engagement, conversions, and campaign performance with less manual effort. Use our Automation Builder inside Salesforce to create multi-step conversational flows triggered by any Salesforce event.</dd>
          
          <dt>How do I schedule a WhatsApp message?</dt>
          <dd>Use WBConnect+ to schedule messages — select your audience, set a delivery time, and automate personalized customer communication. You can schedule both one-to-one messages and large broadcast campaigns.</dd>
        </dl>

        <h3>Setup &amp; Onboarding</h3>
        <dl>
          <dt>How do I connect my WhatsApp account to Salesforce?</dt>
          <dd>We provide a seamless "Embedded Sign-Up" wizard. You simply log in with your Facebook Business credentials inside Salesforce, select or create your WhatsApp Business Account (WABA), and verify your phone number to complete the connection.</dd>
          
          <dt>Can I use an existing WhatsApp number?</dt>
          <dd>Yes, you can migrate an existing number to the API. However, you must first delete the account associated with that number from the standard WhatsApp or WhatsApp Business mobile app before connecting it via WBConnect+.</dd>
          
          <dt>What is Meta Business Verification, and is it required?</dt>
          <dd>Business Verification is Meta's process to confirm your legal business identity. While you can start sending a small batch of messages immediately after sign-up, completing this verification is required to unlock higher daily messaging limits and full API access.</dd>
          
          <dt>How long does the technical setup process take?</dt>
          <dd>The initial installation and embedded sign-up take only a few minutes. However, if you need to complete Meta's Business Verification, the approval process from Meta typically takes 1 to 3 business days.</dd>
          
          <dt>Is my data secure when using this integration?</dt>
          <dd>Yes. WBConnect+ operates entirely inside your Salesforce environment, inheriting Salesforce's enterprise-grade security. All messages transmitted through the WhatsApp Business API utilize end-to-end encryption.</dd>
        </dl>

        <h3>Message Templates</h3>
        <dl>
          <dt>What are WhatsApp Message Templates?</dt>
          <dd>Templates are predefined, structured message formats required by Meta to initiate conversations with customers outside of the 24-hour service window. They can include text, media, and interactive buttons.</dd>
          
          <dt>Do I need Meta's approval before using a template?</dt>
          <dd>Yes, all templates must be reviewed and approved by Meta to ensure they comply with WhatsApp's commerce and business policies. You can submit them directly from Salesforce, and approval usually takes just a few minutes.</dd>
          
          <dt>Can I personalize my template messages?</dt>
          <dd>Absolutely. You can map WhatsApp template variables (e.g., {{1}}, {{2}}) directly to your Salesforce fields (such as Contact Name, Order Number, or Appointment Date) so that every outgoing message is customized for the recipient.</dd>
          
          <dt>Can I include buttons or links in my templates?</dt>
          <dd>Yes, WBConnect+ fully supports interactive templates. You can add "Quick Reply" buttons for simple responses (e.g., Yes/No) or "Call-to-Action" buttons that link to a website URL or trigger a direct phone call.</dd>
          
          <dt>Why was my template rejected by Meta?</dt>
          <dd>Templates are usually rejected if they violate Meta's commerce policies, contain spelling/grammatical errors, or use improper variable formatting. The rejection reason is logged in Salesforce so you can make necessary edits and resubmit.</dd>
        </dl>

        <h3>Broadcasts &amp; Audiences</h3>
        <dl>
          <dt>What is a WhatsApp Broadcast?</dt>
          <dd>A broadcast allows you to send mass messages (using pre-approved templates) to a targeted list of Salesforce Contacts or Leads simultaneously. It is highly effective for marketing campaigns, alerts, and mass updates.</dd>
          
          <dt>How do I create an audience list for a Broadcast?</dt>
          <dd>You can create "Broadcast Groups" in two ways: by selecting records directly from your existing Salesforce List Views, or by uploading a CSV file containing your customer data and phone numbers.</dd>
          
          <dt>Are there daily limits on how many broadcast messages I can send?</dt>
          <dd>WBConnect+ does not restrict your sending volume. However, Meta enforces a daily messaging limit that starts at 250 or 1,000 business-initiated conversations. This limit automatically scales up (to 10K, 100K, or unlimited) based on your phone number's quality rating.</dd>
          
          <dt>Can I schedule a broadcast for a future date?</dt>
          <dd>Yes, WBConnect+ allows you to configure a broadcast and schedule it to be sent automatically at a specific date and time, ensuring your messages reach customers at the optimal moment.</dd>
          
          <dt>What happens if a customer replies 'STOP' to a broadcast?</dt>
          <dd>WBConnect+ supports opt-out compliance. You can easily configure rules so that when a customer opts out, their Salesforce Contact/Lead record is flagged, ensuring they are automatically excluded from any future broadcast groups.</dd>
        </dl>

        <h3>Automation &amp; Flows</h3>
        <dl>
          <dt>What is the Automation feature in WBConnect+?</dt>
          <dd>Our Automation feature allows you to build interactive, multi-step conversational flows directly within Salesforce. Instead of just sending a single message, you can create automated, chatbot-like experiences that guide customers through a series of predefined paths.</dd>
          
          <dt>How does button-based routing work in an Automation?</dt>
          <dd>When setting up an automation flow, you select an initial WhatsApp template that contains Quick Reply buttons. From there, you can define specific actions for each button. When a customer clicks a specific button, WBConnect+ automatically sends the corresponding follow-up template you mapped to that reply.</dd>
          
          <dt>Can I build complex conversational trees?</dt>
          <dd>Yes. Because you determine which template is sent next based on the customer's exact button click, you can build dynamic decision trees. For example, if a customer clicks "Support," they receive a support-focused template, but if they click "Sales," they receive a pricing template.</dd>
          
          <dt>Can I trigger these interactive automations automatically?</dt>
          <dd>Yes! You can trigger the start of an interactive flow based on Salesforce events (like a Lead status changing to "Qualified") using Salesforce Flow Builder. Once the initial template is sent, the WBConnect+ Automation engine handles all the subsequent back-and-forth based on the customer's button clicks.</dd>
          
          <dt>Do I need coding skills to build these button-reply flows?</dt>
          <dd>No coding is required. The Automation interface provides a straightforward, visual way to map your templates. You simply select your starting template, view the available buttons, and choose which template should be sent next from a dropdown menu.</dd>
        </dl>

        <h3>Billing &amp; Performance</h3>
        <dl>
          <dt>Are WhatsApp messages free to send?</dt>
          <dd>Meta charges per conversation. Incoming customer service conversations are charged at one rate, while business-initiated conversations (like Broadcasts or Automated Flow templates) are charged based on the template category (Marketing, Utility, Authentication) and the recipient's country.</dd>
          
          <dt>How do I pay for the WhatsApp messages?</dt>
          <dd>Since billing is handled directly by Meta, you must attach a credit card or set up a line of credit within your Meta Business Manager account to cover the cost of the WhatsApp conversations.</dd>
          
          <dt>What is the "24-hour customer service window"?</dt>
          <dd>When a customer sends a message to your WhatsApp number, a 24-hour window opens. During this timeframe, you can reply with free-form text without needing to use a pre-approved template, and all messages within that window are counted as a single "Service Conversation."</dd>
          
          <dt>Can I track the delivery status of my messages?</dt>
          <dd>Yes. WBConnect+ provides real-time status updates directly on the Salesforce record. You can see exactly when a message was Sent, Delivered, Read, or if it Failed.</dd>
          
          <dt>Where can I view the overall performance of a Broadcast campaign?</dt>
          <dd>For every Broadcast sent, WBConnect+ generates a detailed analytics summary within Salesforce. You can view the total number of recipients, the delivery success rate, read receipts, and access specific error logs if any messages failed to send.</dd>
        </dl>

        <h3>Technical &amp; Support</h3>
        <dl>
          <dt>Is WBConnect+ secure?</dt>
          <dd>Yes, WBConnect+ operates entirely within your Salesforce environment, inheriting Salesforce's enterprise-grade security. Messages are transmitted securely via the official WhatsApp Business API, which utilizes end-to-end encryption.</dd>
          
          <dt>Where can I get support if I face an issue?</dt>
          <dd>You can reach our support team directly through the help portal or by emailing WBConnect Support. We also provide comprehensive technical documentation and user guides for all features.</dd>
        </dl>
